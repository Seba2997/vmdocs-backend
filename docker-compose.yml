services:

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: vmdocs
      POSTGRES_PASSWORD: vmdocs
      POSTGRES_DB: vmdocs
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vmdocs -d vmdocs"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
    env_file: .env.testing
    ports:
      - "8000:8000"
    volumes:
      - uploads:/uploads
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ../vmdocs-frontend
      args:
        VITE_API_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  uploads:
